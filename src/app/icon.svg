<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="m-feather" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f48fb1"/>
      <stop offset="55%" stop-color="#e94f7a"/>
      <stop offset="100%" stop-color="#b73465"/>
    </linearGradient>
    <radialGradient id="m-eye" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fff4d6"/>
      <stop offset="45%" stop-color="#f7c46c"/>
      <stop offset="100%" stop-color="#3a0d24"/>
    </radialGradient>
  </defs>

  <!-- Tail fan: 5 feathers, each a tall teardrop with an "eye" dot -->
  <g transform="translate(32 50)">
    <g transform="rotate(-44)">
      <path d="M0 0 C -5 -14 -4 -28 0 -38 C 4 -28 5 -14 0 0 Z" fill="url(#m-feather)" opacity="0.95"/>
      <circle cx="0" cy="-30" r="3.2" fill="url(#m-eye)"/>
    </g>
    <g transform="rotate(-22)">
      <path d="M0 0 C -5 -15 -4 -32 0 -44 C 4 -32 5 -15 0 0 Z" fill="url(#m-feather)" opacity="0.97"/>
      <circle cx="0" cy="-35" r="3.6" fill="url(#m-eye)"/>
    </g>
    <g>
      <path d="M0 0 C -5 -16 -4 -34 0 -47 C 4 -34 5 -16 0 0 Z" fill="url(#m-feather)"/>
      <circle cx="0" cy="-37" r="3.8" fill="url(#m-eye)"/>
    </g>
    <g transform="rotate(22)">
      <path d="M0 0 C -5 -15 -4 -32 0 -44 C 4 -32 5 -15 0 0 Z" fill="url(#m-feather)" opacity="0.97"/>
      <circle cx="0" cy="-35" r="3.6" fill="url(#m-eye)"/>
    </g>
    <g transform="rotate(44)">
      <path d="M0 0 C -5 -14 -4 -28 0 -38 C 4 -28 5 -14 0 0 Z" fill="url(#m-feather)" opacity="0.95"/>
      <circle cx="0" cy="-30" r="3.2" fill="url(#m-eye)"/>
    </g>
  </g>

  <!-- Body -->
  <ellipse cx="32" cy="50" rx="5" ry="6" fill="#7a1f3f"/>
  <!-- Head -->
  <circle cx="32" cy="40.5" r="3.8" fill="#7a1f3f"/>
  <!-- Beak -->
  <path d="M32 41 L34.6 42 L32 43 Z" fill="#f7c46c"/>
  <!-- Eye -->
  <circle cx="31" cy="40.2" r="0.7" fill="#fff4d6"/>
  <!-- Crest: 3 stalked dots -->
  <path d="M30.4 38 L29.2 35" stroke="#7a1f3f" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M32 37.6 L32 34.4" stroke="#7a1f3f" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M33.6 38 L34.8 35" stroke="#7a1f3f" stroke-width="0.8" stroke-linecap="round"/>
  <circle cx="29.2" cy="34.4" r="1.1" fill="#e94f7a"/>
  <circle cx="32" cy="33.8" r="1.1" fill="#e94f7a"/>
  <circle cx="34.8" cy="34.4" r="1.1" fill="#e94f7a"/>
</svg>
